<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>avatar</title>
    <link rel="shortcut icon" href="Game/TemplateData/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
      :root {
        --accent: #7c5cff;
        --accent-2: #00d4ff;
        --bg-0: #0b0b14;
        --bg-1: #151527;
      }

      * { box-sizing: border-box; }

      html, body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }

      body {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        color: #e8e8f0;
        background: #808080;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        padding: 32px 16px;
      }

      .title {
        text-align: center;
      }

      .title h1 {
        margin: 0;
        font-size: clamp(2rem, 6vw, 3.5rem);
        font-weight: 800;
        letter-spacing: -0.03em;
        color: #f5f5f5;
      }

      /* Card wrapping the canvas */
      #unity-container {
        position: relative;
        border-radius: 18px;
        padding: 12px;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow:
          0 30px 80px rgba(0,0,0,0.55),
          inset 0 1px 0 rgba(255,255,255,0.06);
        backdrop-filter: blur(8px);
        max-width: 100%;
      }

      #unity-canvas {
        display: block;
        border-radius: 10px;
        background: #000;
        width: min(96vw, 177.78vh, 1600px);
        aspect-ratio: 16 / 10;
        height: auto;
        max-width: 100%;
      }

      /* Loading overlay */
      #unity-loading-bar {
        display: none;
        position: absolute;
        inset: 0;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: rgba(10,10,20,0.65);
        border-radius: 18px;
        backdrop-filter: blur(4px);
      }

      #unity-logo {
        width: 154px;
        height: 130px;
        background: url('Game/TemplateData/unity-logo-dark.png') no-repeat center;
        opacity: 0.9;
      }

      #unity-progress-bar-empty {
        width: 240px;
        height: 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.10);
        overflow: hidden;
      }

      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-2));
        transition: width 0.2s ease;
      }

      /* Footer / controls */
      #unity-footer {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-top: 12px;
        padding: 0 4px;
        color: #9a9ab0;
        font-size: 0.85rem;
      }

      #unity-build-title {
        font-weight: 600;
        color: #c8c8da;
        margin-right: auto;
      }

      #unity-fullscreen-button {
        cursor: pointer;
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background:
          url('Game/TemplateData/fullscreen-button.png') no-repeat center / 18px,
          rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.10);
        transition: background-color 0.15s ease, transform 0.15s ease;
      }

      #unity-fullscreen-button:hover {
        background-color: rgba(124,92,255,0.25);
        transform: translateY(-1px);
      }

      #unity-logo-title-footer { display: none; }

      #unity-warning {
        position: absolute;
        left: 50%;
        top: 16px;
        transform: translateX(-50%);
        z-index: 10;
      }

      .page-footer {
        font-size: 0.8rem;
        color: #6a6a82;
      }

      .page-footer a { color: #9a9ab0; text-decoration: none; }
      .page-footer a:hover { color: var(--accent-2); }

      /* Mobile: fill screen */
      #unity-container.unity-mobile {
        width: 100%;
        height: 100%;
        padding: 0;
        border-radius: 0;
        border: none;
        box-shadow: none;
      }
      #unity-canvas.unity-mobile { border-radius: 0; }
    </style>
  </head>
  <body>
    <div class="title">
      <h1>avatar</h1>
    </div>

    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-fullscreen-button" title="Fullscreen"></div>
      </div>
    </div>

    <script>
      var canvas = document.querySelector("#unity-canvas");

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: #e03131; color:#fff; padding: 10px; border-radius:8px;';
        else {
          if (type == 'warning') div.style = 'background: #f1c40f; color:#000; padding: 10px; border-radius:8px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Game/Build";
      var loaderUrl = buildUrl + "/Game.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Game.data",
        frameworkUrl: buildUrl + "/Game.framework.js",
        codeUrl: buildUrl + "/Game.wasm",
        streamingAssetsUrl: "Game/StreamingAssets",
        companyName: "DefaultCompany",
        productName: "avatar",
        productVersion: "0.1.0",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        document.querySelector("#unity-container").className = "unity-mobile";
        canvas.className = "unity-mobile";
      }
      // Desktop: size controlled by CSS (responsive, 16:10), no fixed px here.

      document.querySelector("#unity-loading-bar").style.display = "flex";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          document.querySelector("#unity-loading-bar").style.display = "none";
          document.querySelector("#unity-fullscreen-button").onclick = () => {
            unityInstance.SetFullscreen(1);
          };
        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
